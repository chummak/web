<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รวมเว็บไซต์</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    text-align:center;
    padding:40px;
}

h1{
    color:#333;
}

#list{
    margin-top:30px;
}

.card{
    display:inline-block;
    margin:10px;
    padding:15px 25px;
    background:white;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card a{
    text-decoration:none;
    font-size:18px;
    color:#007bff;
}
</style>

</head>

<body>

<h1>ยินดีต้อนรับ</h1>
<p>รวมเว็บไซต์ในโฟลเดอร์ต่าง ๆ</p>

<div id="list"></div>

<script>

const user = "chummak"
const repo = "web"

fetch(`https://api.github.com/repos/${user}/${repo}/contents/`)
.then(res => res.json())
.then(data => {

    const list = document.getElementById("list")

    data.forEach(item => {

        if(item.type === "dir"){

            const div = document.createElement("div")
            div.className = "card"

            div.innerHTML =
            `<a href="https://${user}.github.io/${repo}/${item.name}/" target="_blank">
            ${item.name}
            </a>`

            list.appendChild(div)

        }

    })

})

</script>

</body>
</html>
